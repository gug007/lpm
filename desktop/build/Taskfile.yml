version: '3'

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm install

  build:frontend:
    summary: Build the frontend project
    dir: frontend
    sources:
      - "**/*"
      - exclude: node_modules/**/*
      - exclude: dist/**/*
    generates:
      - dist/**/*
    deps:
      - install:frontend:deps
      - task: generate:bindings
    cmds:
      - 'npm run {{if eq .DEV "true"}}build:dev{{else}}build{{end}} -q'
    env:
      PRODUCTION: '{{if eq .DEV "true"}}false{{else}}true{{end}}'

  generate:bindings:
    summary: Regenerate frontend bindings from Go services
    sources:
      - "**/*.go"
      - exclude: frontend/**/*
      - exclude: build/**/*
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings

  generate:icons:
    summary: Generates Mac .icns from build/appicon.png
    dir: build
    sources:
      - appicon.png
    generates:
      - darwin/icons.icns
    cmds:
      - wails3 generate icons -input appicon.png -macfilename darwin/icons.icns

  dev:frontend:
    summary: Runs the Vite dev server on WAILS_VITE_PORT
    deps:
      - install:frontend:deps
    dir: frontend
    cmds:
      - npm run dev -- --port {{.VITE_PORT | default 9245}} --strictPort
