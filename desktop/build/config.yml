version: '3'

info:
  productName: "lpm"
  productIdentifier: "com.gug007.lpm"
  description: "lpm — Local Project Manager"
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build
    file:
      - .DS_Store
      - .gitignore
      - "*_test.go"
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: go build -o bin/lpm .
      type: blocking
    - cmd: npm --prefix frontend run dev
      type: background
    - cmd: ./bin/lpm
      type: primary
