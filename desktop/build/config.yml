version: '3'

info:
  companyName: "gug007"
  productName: "lpm"
  productIdentifier: "com.gug007.lpm"
  description: "Local Project Manager"
  copyright: "(c) 2026, gug007"
  comments: ""
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build/bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 task build DEV=true
      type: blocking
    - cmd: wails3 task dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
