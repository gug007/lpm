name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop-macos:
    runs-on: macos-14
    env:
      # Tauri's bundler signs the .app with this identity (cert imported below).
      APPLE_SIGNING_IDENTITY: "Developer ID Application: Gurgen Abagyan (N7S7ZCZ5P7)"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/frontend/src-tauri

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "temp-password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp-password" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp-password" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$CERT_PATH"

      - name: Store notarization API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Install dependencies
        working-directory: desktop/frontend
        run: npm ci

      # `tauri build` signs (APPLE_SIGNING_IDENTITY), then notarizes + staples
      # using the App Store Connect API key, then builds the DMG — replacing the
      # old manual codesign/notarytool/stapler/create-dmg.sh steps. LPM_VERSION is
      # the version the app reports (option_env! at compile time); --config keeps
      # the bundle's CFBundleShortVersionString in sync.
      - name: Build, sign & notarize
        working-directory: desktop/frontend
        env:
          LPM_VERSION: ${{ env.VERSION }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          npx tauri build --target aarch64-apple-darwin --config "{\"version\":\"$VERSION\"}"
          npx tauri build --target x86_64-apple-darwin --config "{\"version\":\"$VERSION\"}"

      # Tauri notarizes + staples the .app but leaves the DMG itself
      # un-notarized, which can trip Gatekeeper on a manual browser download.
      # (The in-app updater copies the stapled .app from inside, so it's
      # unaffected — this is purely for clean manual-download UX.)
      - name: Notarize & staple DMGs
        working-directory: desktop/frontend
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          arm_dmg=(src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          amd_dmg=(src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg)
          submit() {
            xcrun notarytool submit "$1" \
              --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" \
              --wait --timeout 30m
          }
          # Submit both arches concurrently so the two Apple waits overlap.
          submit "$arm_dmg" & arm_pid=$!
          submit "$amd_dmg" & amd_pid=$!
          wait "$arm_pid"
          wait "$amd_pid"
          xcrun stapler staple "$arm_dmg"
          xcrun stapler staple "$amd_dmg"

      # The in-app updater (updates.rs) only matches assets ending in
      # macos-arm64.dmg / macos-amd64.dmg, so rename Tauri's per-arch output.
      - name: Rename DMGs to updater asset names
        working-directory: desktop/frontend
        run: |
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg lpm-desktop-macos-arm64.dmg
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg lpm-desktop-macos-amd64.dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/frontend/lpm-desktop-macos-arm64.dmg
            desktop/frontend/lpm-desktop-macos-amd64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          [ -f "$KEYCHAIN_PATH" ] && security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf "$RUNNER_TEMP/private_keys"
