name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm install

      - name: Build arm64
        working-directory: desktop
        run: wails build -platform darwin/arm64

      - name: Package arm64
        run: |
          cd desktop/build/bin
          zip -r lpm-desktop-macos-arm64.zip lpm.app
          rm -rf lpm.app

      - name: Build amd64
        working-directory: desktop
        run: wails build -platform darwin/amd64

      - name: Package amd64
        run: |
          cd desktop/build/bin
          zip -r lpm-desktop-macos-amd64.zip lpm.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/build/bin/lpm-desktop-macos-arm64.zip
            desktop/build/bin/lpm-desktop-macos-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
