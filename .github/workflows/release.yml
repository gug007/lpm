name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Each architecture builds on its own runner so the two Rust release
  # compilations (the bulk of the wall-clock) run in parallel instead of
  # back-to-back on a single machine.
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: amd64
    env:
      # Tauri's bundler signs the .app with this identity (cert imported below).
      APPLE_SIGNING_IDENTITY: "Developer ID Application: Gurgen Abagyan (N7S7ZCZ5P7)"
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/frontend/src-tauri
          key: ${{ matrix.target }}

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "temp-password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp-password" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp-password" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$CERT_PATH"

      - name: Store notarization API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Install dependencies
        working-directory: desktop/frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      # `tauri build` signs (APPLE_SIGNING_IDENTITY), then notarizes + staples
      # the .app using the App Store Connect API key, then builds the DMG —
      # replacing the old manual codesign/notarytool/stapler/create-dmg.sh steps.
      # LPM_VERSION is the version the app reports (option_env! at compile time);
      # --config keeps the bundle's CFBundleShortVersionString in sync.
      #
      # The bundled CLI (Contents/MacOS/lpm-cli) is built by beforeBuildCommand
      # (`npm run build:cli`, scripts/build-cli.sh). LPM_CLI_TARGET pins it to the
      # same triple tauri is bundling so the x86_64 job cross-builds the CLI
      # instead of producing a host-arch (arm64) binary; LPM_VERSION flows through
      # so `lpm --version` matches the app. Tauri's macOS bundler code-signs the
      # externalBin alongside the app under the hardened runtime.
      - name: Build, sign & notarize
        working-directory: desktop/frontend
        env:
          LPM_VERSION: ${{ env.VERSION }}
          LPM_CLI_TARGET: ${{ matrix.target }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          npx tauri build --target ${{ matrix.target }} --config "{\"version\":\"$VERSION\"}"

      # Tauri notarizes + staples the .app but leaves the DMG itself
      # un-notarized, which can trip Gatekeeper on a manual browser download.
      # (The in-app updater copies the stapled .app from inside, so it's
      # unaffected — this is purely for clean manual-download UX.)
      - name: Notarize & staple DMG
        working-directory: desktop/frontend
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          dmg=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 30m
          xcrun stapler staple "$dmg"

      # The in-app updater (updates.rs) only matches assets ending in
      # macos-arm64.dmg / macos-amd64.dmg, so rename Tauri's per-arch output.
      - name: Rename DMG to updater asset name
        working-directory: desktop/frontend
        run: |
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg lpm-desktop-macos-${{ matrix.arch }}.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: desktop/frontend/lpm-desktop-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          [ -f "$KEYCHAIN_PATH" ] && security delete-keychain "$KEYCHAIN_PATH" || true
          rm -rf "$RUNNER_TEMP/private_keys"

  # Collect both already-notarized DMGs and publish them in a single release —
  # one creation, so the two parallel build jobs can't race on it.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
