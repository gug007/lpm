name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-macos:
    strategy:
      matrix:
        include:
          - platform: macos-14
            arch: arm64
            name: lpm-desktop-macos-arm64
          - platform: macos-15
            arch: amd64
            name: lpm-desktop-macos-amd64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: wails build -platform darwin/${{ matrix.arch }}

      - name: Package app
        run: |
          cd desktop/build/bin
          ls -la
          zip -r "${{ matrix.name }}.zip" lpm-desktop.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/build/bin/${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
